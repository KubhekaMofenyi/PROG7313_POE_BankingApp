name: Final Release Validation

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  release-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Give Gradle permission
        run: chmod +x ./gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Run tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Build APK
        run: ./gradlew assembleDebug
